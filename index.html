<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>IKI STORE</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

.header {
  background: #ff5722;
  padding: 10px;
}

.top-bar input {
  width: 70%;
  padding: 8px;
  border-radius: 15px;
  border: none;
}

.top-bar button {
  padding: 8px;
  margin-left: 5px;
}

/* PRODUK */
#product-list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.product {
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

.product img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.product-info {
  padding: 10px;
}

.product-price {
  color: #ff5722;
  font-weight: bold;
}

button {
  background: #ff5722;
  color: white;
  border: none;
  padding: 8px;
  width: 100%;
  border-radius: 8px;
  margin-top: 5px;
}

/* CART */
.cart {
  position: fixed;
  right: 0;
  top: 0;
  width: 250px;
  height: 100%;
  background: white;
  border-left: 2px solid #ccc;
  padding: 10px;
  display: none;
}

.popup {
  display: none;
  position: fixed;
  top: 20%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 20px;
  border-radius: 10px;
}
</style>

</head>
<body>

<header class="header">
  <div class="top-bar">
    <input type="text" id="search" placeholder="Cari..." onkeyup="cariProduk()">
    <button onclick="bukaCart()">🛒</button>
  </div>
</header>

<main id="product-list">

  <div class="product">
    <img src="raw.githubusercontent.com/IKISTROE/IKI-STORE/refs/heads/main/sepatu%20puma.jpg">
    <div class="product-info">
      <div class="title">Puma Speedcat</div>
      <div class="product-price">2.120.000</div>
      <button onclick="tambahCart('Puma Speedcat',2.120.000)">Tambah</button>
    </div>
  </div>

  <div class="product">
    <img src="https://jdsports.id/_next/image?url=https%3A%2F%2Fimages.jdsports.id%2Fi%2Fjpl%2Fjd_B75807_b%3Fw%3D700%26resmode%3Dsharp%26qlt%3D70%26fmt%3Dwebp&w=1920&q=75">
    <div class="product-info">
      <div class="title">Adidas Samba</div>
      <div class="product-price">1.899.000</div>
      <button onclick="tambahCart('Adidas Samba',1.899.000)">Tambah</button>
    </div>
  </div>

   <div class="product">
    <img src="https://images.unsplash.com/photo-1584735175097-719d848f8449">
    <div class="product-info">
      <div class="title">New balance530 White Silver Navy</div>
      <div class="product-price">1.799.000</div>
      <button onclick="tambahCart('New balance530 White Silver Navy',1.799.000)">Tambah</button>
    </div>
  </div>
  
<div class="product">
    <img src="https://images.unsplash.com/photo-1584735175097-719d848f8449">
    <div class="product-info">
      <div class="title">Nike Air Force 1 Low White Black GS</div>
      <div class="product-price">1.799.000</div>
      <button onclick="tambahCart('Nike Air Force 1 Low White Black GS',2.569.000)">Tambah</button>
    </div>
  </div>
  
  <div class="product">
    <img src="https://images.unsplash.com/photo-1584735175097-719d848f8449">
    <div class="product-info">
      <div class="title">Salomon XT-6 GORE-TEX</div>
      <div class="product-price">4.349.000</div>
      <button onclick="tambahCart('alomon XT-6 GORE-TEX',4.349.000)">Tambah</button>
    </div>
  </div>
</main>

<!-- CART -->
<div class="cart" id="cart">
  <h3>Keranjang</h3>
  <ul id="list"></ul>
  <h4>Total: Rp <span id="total">0</span></h4>
  <button onclick="checkout()">Checkout</button>
</div>

<!-- POPUP BAYAR -->
<div class="popup" id="bayarBox">
  <h3>QRIS</h3>
  <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/QR_code_example.svg" width="150">
  <p>Scan untuk bayar</p>
  <button onclick="tutup()">Selesai</button>
</div>

<script>
let total = 0;

function tambahCart(nama, harga) {
  let list = document.getElementById("list");
  let item = document.createElement("li");
  item.innerText = nama + " - Rp " + harga;
  list.appendChild(item);

  total += harga;
  document.getElementById("total").innerText = total;
}

function bukaCart() {
  let cart = document.getElementById("cart");
  cart.style.display = cart.style.display === "block" ? "none" : "block";
}

function checkout() {
  document.getElementById("bayarBox").style.display = "block";
}

function tutup() {
  document.getElementById("bayarBox").style.display = "none";
}

function cariProduk() {
  let input = document.getElementById("search").value.toLowerCase();
  let produk = document.querySelectorAll(".product");

  produk.forEach(p => {
    let nama = p.querySelector(".title").innerText.toLowerCase();
    p.style.display = nama.includes(input) ? "block" : "none";
  });
}
</script>

</body>
</html>
